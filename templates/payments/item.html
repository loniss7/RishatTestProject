<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy {{ item.name }}</title>
</head>
<body>
    <h1>{{ item.name }}</h1>
    <p>{{ item.description }}</p>
    <p>Price: {{ item.price }} {{ item.currency|upper }}</p>

    {% if stripe_available %}
        <div id="card-element" style="max-width: 420px; margin-bottom: 12px;"></div>
        <button id="buy-button">Pay</button>
        <p id="payment-message"></p>
        <script src="https://js.stripe.com/v3/"></script>
        <script>
            const stripe = Stripe("{{ publishable_key|escapejs }}");
            const elements = stripe.elements();
            const cardElement = elements.create("card");
            cardElement.mount("#card-element");

            const buyButton = document.getElementById("buy-button");
            const paymentMessage = document.getElementById("payment-message");

            buyButton.addEventListener("click", async () => {
                buyButton.disabled = true;
                paymentMessage.textContent = "";

                const response = await fetch("{{ buy_url }}", { method: "GET" });
                const paymentData = await response.json();

                if (paymentData.error) {
                    paymentMessage.textContent = paymentData.error;
                    buyButton.disabled = false;
                    return;
                }

                const result = await stripe.confirmCardPayment(paymentData.client_secret, {
                    payment_method: {
                        card: cardElement,
                    },
                });

                if (result.error) {
                    paymentMessage.textContent = result.error.message;
                    buyButton.disabled = false;
                    return;
                }

                if (result.paymentIntent && result.paymentIntent.status === "succeeded") {
                    paymentMessage.textContent = "Payment was successful.";
                } else {
                    paymentMessage.textContent = "Payment status: " + (result.paymentIntent?.status || "unknown");
                    buyButton.disabled = false;
                }
            });
        </script>
    {% else %}
        <p style="color: #b00020;">Stripe is not configured: {{ stripe_error }}</p>
    {% endif %}
</body>
</html>
